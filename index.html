<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recorrido Virtual 360°</title>



    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.css"/>

   

    <link rel="stylesheet" href="css/style.css">

</head>
<body>



    <div id="panorama"></div>



    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.js"></script>



    <script>

    fetch('tour.json')

        .then(respuesta => respuesta.json())

        .then(datos => {

            const miVisor = pannellum.viewer('panorama', datos);



            miVisor.on('mousedown', function(event) {

                const pitch = miVisor.getPitch();

                const yaw = miVisor.getYaw();

                console.log(`"pitch": ${pitch.toFixed(1)},`);

                console.log(`"yaw": ${yaw.toFixed(1)},`);

                console.log("-----------------------");

            });

        })

        .catch(error => {

            console.error("¡Atención! El archivo tour.json tiene un error de sintaxis:", error);

        });

</script>



</body>
</html>
